<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Lagos 酒店分布地图</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", Helvetica, Arial, sans-serif; }
  #map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: #e8ecef; }

  /* 顶栏 */
  .topbar {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    z-index: 1000; background: rgba(255,255,255,0.97); backdrop-filter: blur(8px);
    border-radius: 10px; box-shadow: 0 2px 14px rgba(0,0,0,0.12);
    padding: 8px 12px; display: flex; gap: 8px; align-items: center;
    width: min(560px, calc(100vw - 24px));
  }
  .topbar input {
    flex: 1; border: 1px solid #d8d8d8; border-radius: 6px;
    padding: 8px 12px; font-size: 14px; outline: none;
    font-family: inherit;
  }
  .topbar input:focus { border-color: #2b83ba; }
  .topbar .clear-btn {
    border: none; background: #f2f2f2; border-radius: 6px;
    padding: 8px 12px; font-size: 13px; cursor: pointer; color: #555;
    white-space: nowrap;
  }
  .topbar .clear-btn:hover { background: #e6e6e6; }
  .search-results {
    position: absolute; top: 100%; left: 0; right: 0; margin-top: 6px;
    background: white; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    max-height: 320px; overflow-y: auto; display: none;
  }
  .search-results.active { display: block; }
  .search-item {
    padding: 10px 14px; border-bottom: 1px solid #f0f0f0; cursor: pointer;
    font-size: 13px;
  }
  .search-item:last-child { border-bottom: none; }
  .search-item:hover { background: #f7f9fb; }
  .search-item .n { font-weight: 600; color: #222; }
  .search-item .n.company { color: #e67300; }
  .search-item .meta { color: #888; font-size: 11px; margin-top: 2px; }
  .search-empty { padding: 16px; color: #999; text-align: center; font-size: 13px; }

  /* 图例 */
  .legend {
    position: absolute; bottom: 20px; left: 12px; z-index: 1000;
    background: rgba(255,255,255,0.97); backdrop-filter: blur(8px);
    border-radius: 10px; box-shadow: 0 2px 14px rgba(0,0,0,0.12);
    padding: 10px 14px; font-size: 12px; line-height: 1.7;
    max-width: 240px;
  }
  .legend h4 { margin: 0 0 6px 0; font-size: 13px; color: #222; }
  .legend .row { display: flex; align-items: center; gap: 8px; }
  .legend .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .legend .dot.big { width: 13px; height: 13px; border: 2px solid white; box-shadow: 0 0 0 1px #e67300; }
  .legend .divider { height: 1px; background: #eee; margin: 6px 0; }
  .legend .gdp-bar {
    height: 10px; border-radius: 3px; margin: 4px 0;
    background: linear-gradient(to right, #2b9d48, #f0d048, #e54d4d);
  }
  .legend .gdp-labels { display: flex; justify-content: space-between; color: #888; font-size: 10px; }

  /* 控件 */
  .controls {
    position: absolute; top: 70px; right: 12px; z-index: 1000;
    background: rgba(255,255,255,0.97); backdrop-filter: blur(8px);
    border-radius: 10px; box-shadow: 0 2px 14px rgba(0,0,0,0.12);
    padding: 10px 12px; font-size: 12px;
  }
  .controls label { display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; padding: 3px 0; }
  .controls label input { margin: 0; }
  .controls .title { font-weight: 600; color: #222; margin-bottom: 4px; font-size: 12px; }

  /* Popup 样式 */
  .leaflet-popup-content-wrapper {
    border-radius: 8px; padding: 2px; box-shadow: 0 3px 14px rgba(0,0,0,0.15);
  }
  .leaflet-popup-content { margin: 10px 14px; font-size: 13px; line-height: 1.55; min-width: 180px; }
  .leaflet-popup-content .hn { font-weight: 600; font-size: 14px; color: #222; margin-bottom: 4px; }
  .leaflet-popup-content .hn.company { color: #e67300; }
  .leaflet-popup-content .hp { color: #2b9d48; font-weight: 600; }
  .leaflet-popup-content .hp.noprice { color: #888; font-style: italic; font-weight: normal; }
  .leaflet-popup-content .ha { color: #666; font-size: 11.5px; margin-top: 4px; }
  .leaflet-popup-content .badge {
    display: inline-block; background: #fff1e0; color: #e67300;
    font-size: 10.5px; padding: 1px 6px; border-radius: 3px;
    margin-left: 6px; vertical-align: middle; font-weight: 600;
  }

  /* 区域 tooltip */
  .region-label {
    background: rgba(0,0,0,0.72); color: white; border: none;
    border-radius: 4px; padding: 3px 8px; font-size: 11.5px;
    font-weight: 600; box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
  .region-label::before { border-top-color: rgba(0,0,0,0.72); }

  /* 加载遮罩 */
  .loading {
    position: absolute; inset: 0; z-index: 2000;
    background: #f0f2f5; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 14px;
  }
  .loading.hidden { display: none; }
  .loading .spinner {
    width: 36px; height: 36px; border: 3px solid #dde1e5;
    border-top-color: #2b83ba; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading .text { color: #555; font-size: 13px; }

  /* 移动端 */
  @media (max-width: 640px) {
    .controls { top: auto; bottom: 160px; right: 10px; font-size: 11.5px; padding: 8px 10px; }
    .legend { bottom: 10px; left: 10px; font-size: 11px; max-width: 200px; padding: 8px 10px; }
  }

  /* 聚合气泡外观微调 */
  .marker-cluster-small { background-color: rgba(130,190,100,0.65); }
  .marker-cluster-small div { background-color: rgba(90,160,70,0.85); }
  .marker-cluster-medium { background-color: rgba(230,180,80,0.65); }
  .marker-cluster-medium div { background-color: rgba(210,150,60,0.85); }
  .marker-cluster-large { background-color: rgba(230,110,80,0.6); }
  .marker-cluster-large div { background-color: rgba(210,80,60,0.85); }
  .marker-cluster div { color: white; font-weight: 600; }
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="text">正在加载 Lagos 地图…</div>
</div>

<div id="map"></div>

<div class="topbar">
  <input id="search" type="text" placeholder="🔍 搜索酒店名称…" autocomplete="off" />
  <button class="clear-btn" id="clearBtn">清除</button>
  <div class="search-results" id="searchResults"></div>
</div>

<div class="controls">
  <div class="title">显示</div>
  <label><input type="checkbox" id="togGreen" checked><span>有价格 (绿)</span></label>
  <label><input type="checkbox" id="togBlue" checked><span>无价格 (蓝)</span></label>
  <label><input type="checkbox" id="togGray" checked><span>疑似公寓 (灰)</span></label>
  <label><input type="checkbox" id="togOrange" checked><span>我司酒店 (橙)</span></label>
  <label><input type="checkbox" id="togGDP" checked><span>GDP 底色</span></label>
  <label><input type="checkbox" id="togBoundary" checked><span>区域边界</span></label>
</div>

<div class="legend">
  <h4>图例</h4>
  <div class="row"><span class="dot" style="background:#2b9d48"></span>有价格酒店 <span id="cntGreen" style="color:#888;margin-left:auto"></span></div>
  <div class="row"><span class="dot" style="background:#2b83ba"></span>无价格酒店 <span id="cntBlue" style="color:#888;margin-left:auto"></span></div>
  <div class="row"><span class="dot" style="background:#888"></span>疑似公寓 <span id="cntGray" style="color:#888;margin-left:auto"></span></div>
  <div class="row"><span class="dot big" style="background:#e67300"></span><b style="color:#e67300">我司酒店</b> <span id="cntOrange" style="color:#888;margin-left:auto"></span></div>
  <div class="divider"></div>
  <div style="font-size:11px;color:#555">区域人均 GDP (US$)</div>
  <div class="gdp-bar"></div>
  <div class="gdp-labels"><span>低 ($1.5k)</span><span>高 ($19k)</span></div>
</div>

const GDP = {"Eti Osa":{"pop":85,"gdp":18876},"Lagos Island":{"pop":32,"gdp":18444},"Ikeja":{"pop":79,"gdp":13401},"Apapa":{"pop":48,"gdp":12680},"Amuwo Odofin":{"pop":63,"gdp":10663},"Kosofe":{"pop":75,"gdp":9798},"Surulere":{"pop":68,"gdp":8934},"Oshodi/Isolo":{"pop":90,"gdp":8213},"Ibeju Lekki":{"pop":29,"gdp":7637},"Badagry":{"pop":38,"gdp":7061},"Agege":{"pop":82,"gdp":6484},"Lagos Mainland":{"pop":51,"gdp":5908},"Epe":{"pop":35,"gdp":5476},"Shomolu":{"pop":60,"gdp":4899},"Ojo":{"pop":69,"gdp":4323},"Ikorodu":{"pop":63,"gdp":4035},"Ifako/Ijaye":{"pop":66,"gdp":3891},"Mushin":{"pop":120,"gdp":3026},"Ajeromi/Ifelodun":{"pop":133,"gdp":1729},"Alimosho":{"pop":258,"gdp":1513}};

// hotel 数据格式: [lat, lon, cat, name, price, address, region]
// cat: 0=绿(有价格) 1=蓝(无价格) 2=灰(公寓) 3=橙(我司)

// ======== 工具函数 ========
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// GDP → 颜色 (绿→黄→红 渐变)
function gdpColor(g) {
  const vals = Object.values(GDP).map(x => x.gdp);
  const min = Math.min(...vals), max = Math.max(...vals);
  const t = (g - min) / (max - min);  // 0 低 → 1 高
  // 绿(低) → 黄(中) → 红(高) 但题意相反:越高越富->越红,越低->绿
  // 用户说: 从绿到灰到红,越往后(后文)说明该区域越有钱
  // 即 富 = 红,穷 = 绿. 这里 GDP 高 = 富 = 红,GDP 低 = 穷 = 绿
  // t=1 (高GDP/富) → 红; t=0 (低GDP/穷) → 绿
  // 三段渐变 via HSL: 绿(120) → 黄(55) → 红(5)
  const hue = t < 0.5 ? 120 - (120 - 55) * (t / 0.5) : 55 - (55 - 5) * ((t - 0.5) / 0.5);
  const sat = 55 + 10 * Math.abs(t - 0.5) * 2;
  const light = 50 + (0.5 - Math.abs(t - 0.5)) * 10;
  return `hsl(${hue}, ${sat}%, ${light}%)`;
}

// ======== 地图初始化 ========
const map = L.map('map', {
  center: [6.5244, 3.3792],  // Lagos 中心
  zoom: 11,
  minZoom: 9,
  maxZoom: 18,
  preferCanvas: true,
  zoomControl: true,
  worldCopyJump: false,
});

// 底图: OpenStreetMap (免费,微信里通畅)
const baseLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap',
  maxZoom: 19,
  crossOrigin: true,
});
baseLayer.addTo(map);

// ======== 行政区边界 + GDP 底色 ========
const boundaryLayer = L.geoJSON(BOUNDARIES, {
  style: function(feature) {
    const name = feature.properties.name;
    const g = GDP[name];
    return {
      color: '#3a3a3a',
      weight: 1.2,
      opacity: 0.7,
      fillColor: g ? gdpColor(g.gdp) : '#cccccc',
      fillOpacity: 0.38,  // 默认半透明(随 zoom 调)
    };
  },
  onEachFeature: function(feature, layer) {
    const name = feature.properties.name;
    const g = GDP[name];
    if (g) {
      layer.bindTooltip(
        `<div style="font-weight:600">${escapeHtml(name)}</div>` +
        `<div style="font-size:11px;color:#ddd">人口 ${g.pop}万 · 人均GDP $${g.gdp.toLocaleString()}</div>`,
        { className: 'region-label', sticky: true, direction: 'top' }
      );
    } else {
      layer.bindTooltip(name, { className: 'region-label', sticky: true });
    }
    layer.on('mouseover', e => e.target.setStyle({ weight: 2.5, color: '#111' }));
    layer.on('mouseout', e => boundaryLayer.resetStyle(e.target));
  }
}).addTo(map);

// ======== 根据 zoom 动态调整底色透明度 ========
function updateBoundaryOpacity() {
  const z = map.getZoom();
  // zoom 11 及以下: 满底色 (0.42); zoom 14+: 几乎透明 (0.05); 中间线性插值
  let opacity;
  if (z <= 11) opacity = 0.42;
  else if (z >= 14) opacity = 0.05;
  else opacity = 0.42 - (0.42 - 0.05) * (z - 11) / 3;

  const borderOpacity = z <= 11 ? 0.75 : Math.max(0.25, 0.75 - (z - 11) * 0.15);

  boundaryLayer.eachLayer(l => {
    l.setStyle({ fillOpacity: opacity, opacity: borderOpacity });
  });
}
map.on('zoomend', updateBoundaryOpacity);
updateBoundaryOpacity();

// ======== 酒店点位 ========
// 4 个分类 → 3 种渲染策略:
//   cat 0/1/2: 进聚合层 (MarkerCluster, Canvas 圆点)
//   cat 3 (我司): 独立图层,永不聚合

const styles = {
  0: { color: '#2b9d48', radius: 3.5, label: '有价格' },
  1: { color: '#2b83ba', radius: 3.5, label: '无价格' },
  2: { color: '#9a9a9a', radius: 3.0, label: '疑似公寓' },
  3: { color: '#e67300', radius: 6.5, label: '我司酒店' },
};

// 为每个分类建独立 cluster,方便开关
const clusters = {};
[0, 1, 2].forEach(c => {
  clusters[c] = L.markerClusterGroup({
    chunkedLoading: true,
    chunkInterval: 120,
    chunkDelay: 30,
    maxClusterRadius: z => z >= 15 ? 30 : (z >= 13 ? 45 : 60),
    disableClusteringAtZoom: 16,
    spiderfyOnMaxZoom: true,
    showCoverageOnHover: false,
  });
});

// 我司酒店独立 layer,永不聚合
const companyLayer = L.layerGroup();

function buildPopup(h) {
  const [lat, lon, cat, name, price, addr, region] = h;
  const isCompany = cat === 3;
  const priceHtml = price
    ? `<div class="hp">${escapeHtml(price)}</div>`
    : `<div class="hp noprice">no price in google map</div>`;
  const badge = isCompany ? '<span class="badge">我司</span>' : '';
  return `
    <div class="hn${isCompany ? ' company' : ''}">${escapeHtml(name)}${badge}</div>
    ${priceHtml}
    <div class="ha">${escapeHtml(region || '')}${addr ? ' · ' + escapeHtml(addr) : ''}</div>
  `;
}

// 创建点位 marker
function makeMarker(h) {
  const [lat, lon, cat, name] = h;
  const s = styles[cat];
  const marker = L.circleMarker([lat, lon], {
    radius: s.radius,
    color: cat === 3 ? '#b35200' : s.color,
    weight: cat === 3 ? 2 : 1,
    fillColor: s.color,
    fillOpacity: cat === 3 ? 1 : 0.82,
    opacity: cat === 3 ? 1 : 0.9,
  });
  marker.bindPopup(() => buildPopup(h), { maxWidth: 320, autoPanPadding: [40, 60] });
  marker.bindTooltip(name, { direction: 'top', offset: [0, -s.radius - 2], opacity: 0.9 });
  marker._h = h;  // 用于搜索
  return marker;
}

// 填数据
console.time('build markers');
const allMarkers = [];   // 用于搜索索引
let counts = [0, 0, 0, 0];
HOTELS.forEach(h => {
  const m = makeMarker(h);
  allMarkers.push(m);
  counts[h[2]]++;
  if (h[2] === 3) {
    companyLayer.addLayer(m);
  } else {
    clusters[h[2]].addLayer(m);
  }
});
console.timeEnd('build markers');

// 加到地图
clusters[0].addTo(map);
clusters[1].addTo(map);
clusters[2].addTo(map);
companyLayer.addTo(map);

// 更新计数
document.getElementById('cntGreen').textContent = counts[0];
document.getElementById('cntBlue').textContent = counts[1];
document.getElementById('cntGray').textContent = counts[2];
document.getElementById('cntOrange').textContent = counts[3];

// ======== 图层开关 ========
function bindToggle(id, action) {
  document.getElementById(id).addEventListener('change', (e) => action(e.target.checked));
}
bindToggle('togGreen',    on => on ? map.addLayer(clusters[0]) : map.removeLayer(clusters[0]));
bindToggle('togBlue',     on => on ? map.addLayer(clusters[1]) : map.removeLayer(clusters[1]));
bindToggle('togGray',     on => on ? map.addLayer(clusters[2]) : map.removeLayer(clusters[2]));
bindToggle('togOrange',   on => on ? map.addLayer(companyLayer) : map.removeLayer(companyLayer));
bindToggle('togBoundary', on => on ? map.addLayer(boundaryLayer) : map.removeLayer(boundaryLayer));
bindToggle('togGDP', on => {
  boundaryLayer.eachLayer(l => {
    l.setStyle({ fillOpacity: on ? undefined : 0 });
  });
  if (on) updateBoundaryOpacity();
});

// ======== 搜索 ========
const searchInput = document.getElementById('search');
const searchResults = document.getElementById('searchResults');
const clearBtn = document.getElementById('clearBtn');

let searchTimer = null;
function doSearch(q) {
  q = q.trim().toLowerCase();
  if (!q) { searchResults.classList.remove('active'); searchResults.innerHTML = ''; return; }

  const hits = [];
  for (let i = 0; i < allMarkers.length && hits.length < 50; i++) {
    const h = allMarkers[i]._h;
    if (h[3].toLowerCase().includes(q)) {
      hits.push(allMarkers[i]);
    }
  }

  if (!hits.length) {
    searchResults.innerHTML = '<div class="search-empty">无匹配结果</div>';
    searchResults.classList.add('active');
    return;
  }

  // 我司酒店优先
  hits.sort((a, b) => (b._h[2] === 3 ? 1 : 0) - (a._h[2] === 3 ? 1 : 0));

  searchResults.innerHTML = hits.slice(0, 30).map((m, idx) => {
    const h = m._h;
    const isCompany = h[2] === 3;
    const priceLabel = h[4] || (h[2] === 2 ? '疑似公寓' : 'no price');
    return `<div class="search-item" data-idx="${idx}">
      <div class="n${isCompany ? ' company' : ''}">${escapeHtml(h[3])}${isCompany ? ' <span class="badge">我司</span>' : ''}</div>
      <div class="meta">${escapeHtml(priceLabel)} · ${escapeHtml(h[6] || '')}</div>
    </div>`;
  }).join('');
  searchResults.classList.add('active');

  // 绑定点击
  searchResults.querySelectorAll('.search-item').forEach((el, idx) => {
    el.addEventListener('click', () => {
      const m = hits[idx];
      const [lat, lon] = m._h;
      map.flyTo([lat, lon], 17, { duration: 0.8 });
      setTimeout(() => {
        if (m._h[2] === 3) {
          m.openPopup();
        } else {
          // 聚合层里的 marker 要先 zoom 才能 open
          const cluster = clusters[m._h[2]];
          cluster.zoomToShowLayer(m, () => m.openPopup());
        }
      }, 600);
      searchResults.classList.remove('active');
    });
  });
}

searchInput.addEventListener('input', (e) => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => doSearch(e.target.value), 120);
});
searchInput.addEventListener('focus', () => {
  if (searchInput.value.trim()) doSearch(searchInput.value);
});
document.addEventListener('click', (e) => {
  if (!e.target.closest('.topbar')) searchResults.classList.remove('active');
});

clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  searchResults.classList.remove('active');
  searchResults.innerHTML = '';
  map.setView([6.5244, 3.3792], 11);
});

// ======== 加载完毕 ========
setTimeout(() => document.getElementById('loading').classList.add('hidden'), 300);

// 适配 Lagos 边界范围
map.fitBounds(boundaryLayer.getBounds(), { padding: [20, 20] });
</script>
